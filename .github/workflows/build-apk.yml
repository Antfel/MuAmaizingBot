name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APKs (arm32 + arm64 + x86_64)
        run: ./gradlew assembleArm32Debug assembleArm64Debug assembleX86_64Debug --no-daemon --stacktrace

      - name: Prepare release artifacts
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cp app/build/outputs/apk/arm32/debug/app-arm32-debug.apk "MuAmaizingBot-${VERSION}-arm32-debug.apk"
          cp app/build/outputs/apk/arm64/debug/app-arm64-debug.apk "MuAmaizingBot-${VERSION}-arm64-debug.apk"
          cp app/build/outputs/apk/x86_64/debug/app-x86_64-debug.apk "MuAmaizingBot-${VERSION}-x86_64-debug.apk"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MuAmaizingBot-apk
          path: MuAmaizingBot-*-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MuAmaizingBot-*-debug.apk
          generate_release_notes: true
          draft: false
